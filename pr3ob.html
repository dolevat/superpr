<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Супер Практическая</title>
    <style>
        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #2c3e50;
            line-height: 1.6;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            max-width: 650px;
            padding: 40px;
            border: 1px solid #e1e8ed;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h3 {
            color: #1a2a3a;
            font-size: 24px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 15px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            margin: 20px 0;
            padding-left: 15px;
            border-left: 3px solid #eee;
        }

        img {
            display: block;
            margin: 30px auto 0;
            max-width: 100%;
            height: auto;
            filter: grayscale(20%); /* Легкий эффект официальности */
            border: 1px solid #ddd;
        }

        .item-number {
            font-weight: bold;
            color: #3498db;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Как справляться со стрессом</h3>
        
        <p><span class="item-number">1.</span> Дышите по схеме «квадрат»: вдох на 4 счета, задержка на 4, выдох на 4, задержка на 4. Это переключает нервную систему из режима тревоги в режим покоя.</p>
        
        <p><span class="item-number">2.</span> Умойтесь холодной водой: резкая смена температуры помогает быстро «сбросить» эмоциональный накал.</p>
        
        <p><span class="item-number">3.</span> </p>
        
        <img src="dvadebila.jpg" alt="dva debila">
    </div>

</body>
</html>
